services:
  ticket-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - TestScenario=normal
      - ConnectionStrings__DefaultConnection=Host=db;Database=TicketDb;Username=postgres;Password=password
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=password
      - Redis__UseSsl=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: ticket-db
    environment:
      - POSTGRES_DB=TicketDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ticket-redis
    # 비밀번호 설정 (appsettings와 일치시킴)
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: